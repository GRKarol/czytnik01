name: Release firmware

# Tworzy GitHub Release z binariami firmware'u kiedy:
#   - push tag v* (`git tag v0.1.0 && git push origin v0.1.0`)
#   - ręcznie z UI: Actions → "Release firmware" → Run workflow → wpisz tag
#
# Release zawiera:
#   - czytnik01.bin       (scalony obraz dla web flashera)
#   - flower-firmware.bin (sama aplikacja, do OTA przez PWA "Aktualizacje")
#
# PWA "Aktualizacje" panel czyta `releases/latest` z tego repo i pokazuje
# nową wersję klientom.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for the release, np. v0.1.0"
        required: true

permissions:
  contents: write # potrzebne do tworzenia release'a

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
            firmware/.pio
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        run: python3 firmware/tools/export_web_firmware.py --version "${{ steps.tag.outputs.name }}"

      - name: Verify artifacts
        run: |
          ls -lh public/firmware/
          test -f public/firmware/czytnik01.bin
          test -f public/firmware/flower-firmware.bin

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Flower firmware ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            public/firmware/czytnik01.bin
            public/firmware/flower-firmware.bin
