[platformio]
default_envs = waveshare_esp32s3_usb_msc

[env]
platform = espressif32@6.3.2
board = esp32-s3-r8-opi
framework = arduino
monitor_speed = 115200
upload_speed = 460800
extra_scripts = pre:tools/pio_set_version.py
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DRSVP_ON_DEVICE_EPUB_CONVERSION=1

# Wspólne flagi dla budowy na ESP32-S3. NimBLE jest tylko tutaj (nie w
# [env]), bo `[env:native_test]` używa platform=native gdzie NimBLE
# headery nie istnieją — bez tego rozdzielenia `pio test -e native_test`
# nie kompiluje się.
[esp32s3_base]
lib_deps =
  h2zero/NimBLE-Arduino@^1.4.2
build_flags =
  ${env.build_flags}
  -DFLOWER_BLE_ENABLED=1

[env:waveshare_esp32s3]
lib_deps = ${esp32s3_base.lib_deps}
build_flags =
  ${esp32s3_base.build_flags}
  -DRSVP_USB_TRANSFER_ENABLED=0

[env:waveshare_esp32s3_usb_msc]
lib_deps = ${esp32s3_base.lib_deps}
build_flags =
  ${esp32s3_base.build_flags}
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_MSC_ON_BOOT=0
  -DRSVP_USB_TRANSFER_ENABLED=1
build_unflags =
  -DARDUINO_USB_MODE=1

[env:native_test]
platform = native
framework =
test_framework = unity
test_filter = test_pacing
test_build_src = yes
build_src_filter = -<*> +<reader/ReadingLoop.cpp>
build_flags =
  -std=c++17
  -Itest/support
  -Isrc
